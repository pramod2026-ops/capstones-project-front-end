<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./style.css">
    <title>Play Quiz</title>
</head>
<body>

    <div class="container">
     <div class="screen active" id="start-screen">
        <h1>Ready for the Quiz?</h1>
        <p>Answer fun questions and test your skills!</p>
        <button class="start-btn">Start Quiz</button>
     </div>




     <div class="screen" id="quiz-screen">
        <div class="quiz-header">
            <h2 id="question-text">Here is your question</h2>
            <div class="quiz-info">
                <p>Question <span id="current-question">1</span> of <span>5</span>
                </p>
                <p>Score:<span id="score">0</span></p>
            </div>
        </div>



        <div id="answer-container">Empty
            ................................
        </div>


        <div class="progress-bar">
            <div id="progress" class="progress"></div>
        </div>
     </div>

     
     <div id="result-screen" class="screen">
        <h1>Quiz Results</h1>
        <div class="result-info">
            <p>You scored <span id="finalscroe">0</span> out of <span id="max-score">5</span></p>
            <div id="result-message">Good job!</div>
        </div>
        <button id="restart-btn">Restar Quiz</button>
     </div>
    </div>
    <script src="./script.js"></script>

</body>
</html>
