<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./style.css">
    <title>Play Quiz</title>
</head>
<body>
<!-- Start Screen Container  -->

    <div class="container">
     <div class="screen active" id="start-screen">
        <h1>Ready for the Quiz?</h1>
        <p>Answer fun questions and test your skills!</p>
        <button class="start-btn" id="start-btn">Start Quiz</button>
     </div>

<!-- quiz Questions and Score section display after clickig Start Quiz button -->


     <div class="screen" id="quiz-screen">
        <div class="quiz-header">
            <h2 id="question-text"></h2>
            <div class="quiz-info">
                <p>Question <span id="current-question">1</span> of <span id="total-questions">all</span>
                </p>
                <p>Score: <span id="score">0</span></p>
            </div>
        </div>


<!-- Answers options container  -->
        <div id="answers-container">
            
        </div>

<!-- Progress-bar section-->
        <div class="progress-bar">
            <div id="progress" class="progress"></div>
        </div>
     </div>

     <!-- Result Section -->
     <div id="result-screen" class="screen">
        <h1>Quiz Results</h1>
        <div class="result-info">
            <p>You scored <span id="final-score">0</span> out of <span id="max-score">5</span></p>
            <div id="result-message">Good job!</div>
        </div>
        <button id="restart-btn">Restart Quiz</button>
     </div>
    </div>
    <script src="./script.js"></script>

</body>
</html>
